<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../../src/imgs/UTILI.png">
</head>
<body>
    <button class="dark-mode-toggle" style="display: none;" id="darkModeToggle">🌙</button>

    <div class="container">
        <div class="header">
            <h1>📱 Gerador de QR Code</h1>
            <p class="subtitle">Crie QR Codes personalizados instantaneamente</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="text">Texto/URL</button>
            <button class="tab-btn" data-tab="wifi">Wi-Fi</button>
            <button class="tab-btn" data-tab="contact">Contato</button>
        </div>

        <!-- Tab: Texto/URL -->
        <div class="tab-content active" id="text">
            <div class="form-group">
                <label>Texto ou URL:</label>
                <textarea id="textInput" placeholder="Digite um texto ou cole um link..."></textarea>
            </div>
        </div>

        <!-- Tab: Wi-Fi -->
        <div class="tab-content" id="wifi">
            <div class="form-group">
                <label>Nome da Rede (SSID):</label>
                <input type="text" id="wifiSSID" placeholder="MinhaRede">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="text" id="wifiPassword" placeholder="senha123">
            </div>
            <div class="form-group">
                <label>Tipo de Segurança:</label>
                <select id="wifiSecurity">
                    <option value="WPA">WPA/WPA2</option>
                    <option value="WEP">WEP</option>
                    <option value="nopass">Sem senha</option>
                </select>
            </div>
        </div>

        <!-- Tab: Contato -->
        <div class="tab-content" id="contact">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="contactName" placeholder="João Silva">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" id="contactPhone" placeholder="+55 11 99999-9999">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="text" id="contactEmail" placeholder="joao@email.com">
            </div>
        </div>

        <!-- Opções de Personalização -->
        <div class="options-grid">
            <div class="form-group">
                <label>Tamanho:</label>
                <select id="qrSize">
                    <option value="128">Pequeno (128px)</option>
                    <option value="256" selected>Médio (256px)</option>
                    <option value="512">Grande (512px)</option>
                    <option value="1024">Extra Grande (1024px)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cor:</label>
                <div class="color-input-wrapper">
                    <input type="color" id="qrColor" value="#000000">
                    <span id="colorValue">#000000</span>
                </div>
            </div>
        </div>

        <button class="btn-generate" id="generateBtn">🔄 Gerar QR Code</button>

        <div class="qr-preview" id="qrPreview">
            <div id="qrcode"></div>
            <div class="download-buttons">
                <button class="btn-download" id="downloadBasic">📥 Baixar (Básico)</button>
                <button class="btn-download premium" id="downloadHD">⭐ Baixar HD (Assista 5s)</button>
            </div>
        </div>
    </div>

    <!-- Modal de Anúncio -->
    <div class="ad-modal" id="adModal">
        <div class="ad-content">
            <h2>📺 Aguarde o anúncio</h2>
            <div class="ad-timer" id="adTimer">5</div>
            <p class="ad-message">Seu download HD começará em breve...</p>
            <button class="btn-close-ad" id="closeAdBtn">✅ Baixar Agora</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
