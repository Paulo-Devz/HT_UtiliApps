<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget de Previsão do Tempo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../../src/imgs/UTILI.png">
</head>
<body>

  <div class="weather-widget">
    <div class="ww-search">
      <input type="text" id="cityInput" placeholder="Digite uma cidade..." />
      <button class="ww-geo-btn" id="geoBtn" title="Usar minha localização">⌖</button>
      <button class="ww-search-btn" id="searchBtn">Buscar</button>
    </div>
    <div id="ww-content">
      <div class="ww-loading">Detectando sua localização...</div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
