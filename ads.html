<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando... — HT UtiliApps</title>
  <link rel="icon" href="src/imgs/UTILI.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0b1a;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(118,75,162,0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(118,75,162,0.13) 1px, transparent 1px);
      background-size: 52px 52px;
      z-index: -3;
    }

    .grid-lines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(150,90,220,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(150,90,220,0.04) 1px, transparent 1px);
      background-size: 26px 26px;
      animation: gridMove 18s linear infinite;
      z-index: -2;
    }

    .grid-lines::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(118,75,162,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(102,63,200,0.06) 0%, transparent 50%);
    }

    @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(26px); } }

    .bg-glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .bg-glow-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: rgba(118,75,162,0.18); animation: glowPulse 10s ease-in-out infinite; }
    .bg-glow-2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: rgba(102,63,200,0.14); animation: glowPulse 13s ease-in-out 4s infinite; }
    .bg-glow-3 { width: 300px; height: 300px; top: 40%; left: 50%; transform: translate(-50%,-50%); background: rgba(150,90,220,0.07); animation: glowPulse 8s ease-in-out 2s infinite; }
    @keyframes glowPulse { 0%,100% { opacity:.5; transform:scale(1); } 50% { opacity:1; transform:scale(1.1); } }

    .bg-sweep { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-sweep::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: -20%; width: 2px;
      background: linear-gradient(180deg, transparent 0%, rgba(180,130,255,0) 15%, rgba(180,130,255,0.35) 40%, rgba(200,160,255,0.5) 50%, rgba(180,130,255,0.35) 60%, rgba(180,130,255,0) 85%, transparent 100%);
      filter: blur(3px);
      animation: lineSweep 7s ease-in-out infinite;
    }
    @keyframes lineSweep { 0% { left:-5%; opacity:0; } 5% { opacity:1; } 95% { opacity:1; } 100% { left:105%; opacity:0; } }

    .star { position: fixed; width: 2px; height: 2px; background: #fff; border-radius: 50%; animation: twinkle 3s infinite; z-index: -1; }
    @keyframes twinkle { 0%,100% { opacity:0.1; } 50% { opacity:0.4; } }

    header {
      position: fixed; top: 0; width: 100%;
      padding: 0 50px; height: 70px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(144,0,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 1px; }

    .container {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 28px; padding: 100px 20px 40px;
      max-width: 500px; width: 100%; text-align: center;
    }

    .destination-info { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .destination-label { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
    .destination-name {
      font-size: 22px; font-weight: 700; color: #fff;
      padding: 6px 20px;
      border: 1px solid rgba(180,130,255,0.3);
      border-radius: 30px;
      background: rgba(118,75,162,0.12);
    }

    .ad-wrapper {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .ad-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); align-self: flex-start; }

    /* Bloqueado */
    .blocked-msg {
      display: none;
      flex-direction: column; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px 32px;
    }

    .blocked-msg p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .blocked-timer { font-size: 28px; font-weight: 700; color: rgba(180,130,255,0.9); }

    .redirect-info { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .redirect-text { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.6; }

    .countdown-ring { position: relative; width: 72px; height: 72px; }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring circle { fill: none; stroke-width: 4; }
    .ring-bg { stroke: rgba(255,255,255,0.08); }
    .ring-progress { stroke: rgba(180,130,255,0.8); stroke-linecap: round; stroke-dasharray: 201; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .countdown-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; }

    .btn-skip {
      padding: 10px 28px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      border-radius: 30px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
      backdrop-filter: blur(8px);
    }
    .btn-skip:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.45); color: #fff; }

    @media (max-width: 520px) { header { padding: 0 20px; } .logo { font-size: 18px; } }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="grid-lines"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
  <div class="bg-sweep"></div>

  <header>
    <div class="logo">HT UtiliApps</div>
  </header>

  <div class="container">

    <div class="destination-info">
      <span class="destination-label">Abrindo aplicativo</span>
      <span class="destination-name" id="dest-label">...</span>
    </div>

    <!-- Banner Adsterra -->
    <div class="ad-wrapper" id="ad-wrapper">
      <span class="ad-label">Publicidade</span>
      <script>
        atOptions = {
          'key' : '0ba151ad591a661133ccb031f37e242a',
          'format' : 'iframe',
          'height' : 250,
          'width' : 300,
          'params' : {}
        };
      </script>
      <script async ="https://www.highperformanceformat.com/0ba151ad591a661133ccb031f37e242a/invoke.js"></script>
    </div>

    <!-- Mensagem de bloqueio (aparece quando está nos 5 min) -->
    <div class="blocked-msg" id="blocked-msg">
      <p>Você assistiu 2 propagandas.<br>Aguarde para continuar sem propaganda.</p>
      <div class="blocked-timer" id="blocked-timer">5:00</div>
      <p style="font-size:12px;color:rgba(255,255,255,0.35);">Indo direto ao app...</p>
    </div>

    <div class="redirect-info">
      <p class="redirect-text">Você será redirecionado em</p>
      <div class="countdown-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="32"/>
          <circle class="ring-progress" id="ring" cx="36" cy="36" r="32"/>
        </svg>
        <div class="countdown-num" id="countdown">5</div>
      </div>
      <a class="btn-skip" id="skip-btn" href="#">Ir agora →</a>
    </div>

  </div>

  <!-- Social Bar Adsterra -->
  <script async ="https://pl28939392.profitablecpmratenetwork.com/ec/31/ab/ec31ab6c2dbac1ec07c1a44bf7e0127f.js"></script>

  <script>
    // ── Estrelas ──
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(s);
    }

    // ── Config ──
    const MAX_ADS    = 2;
    const BLOCK_TIME = 5 * 60 * 1000;
    const CIRCUM     = 2 * Math.PI * 32;

    // ── Destino ──
    const destino = localStorage.getItem('propagandaDestino') || 0;
    const destURL = destino ? './Apps/' + destino + '/main.html' : './';

    document.getElementById('dest-label').textContent =
      destino ? String(destino).replace(/_/g, ' ') : 'HT UtiliApps';
    document.getElementById('skip-btn').href = destURL;

    // ── Verifica bloqueio ──
    const count     = parseInt(localStorage.getItem('propagandasRodadas') || '0');
    const blockedAt = parseInt(localStorage.getItem('propagandasBloqueadoEm') || '0');
    const elapsed   = blockedAt ? Date.now() - blockedAt : BLOCK_TIME;
    const blocked   = count >= MAX_ADS && elapsed < BLOCK_TIME;

    if (blocked) {
      // Esconde banner, mostra aviso
      document.getElementById('ad-wrapper').style.display = 'none';
      document.getElementById('blocked-msg').style.display = 'flex';

      // Atualiza timer de bloqueio a cada segundo
      const blockInterval = setInterval(() => {
        const left = BLOCK_TIME - (Date.now() - blockedAt);
        if (left <= 0) {
          clearInterval(blockInterval);
          localStorage.setItem('propagandasRodadas', '0');
          localStorage.removeItem('propagandasBloqueadoEm');
        }
        const mins = Math.floor(Math.max(0, left) / 60000);
        const secs = Math.floor((Math.max(0, left) % 60000) / 1000);
        document.getElementById('blocked-timer').textContent =
          mins + ':' + String(secs).padStart(2, '0');
      }, 1000);
    }

    // ── Countdown 5s ──
    const ring  = document.getElementById('ring');
    const numEl = document.getElementById('countdown');
    ring.style.strokeDasharray  = CIRCUM;
    ring.style.strokeDashoffset = 0;

    let remaining = 5;

    // Se bloqueado ou sem banner, vai direto em 1.5s
    if (blocked) {
      setTimeout(() => { window.location.href = destURL; }, 1500);
    } else {
      // Verifica se banner carregou
      setTimeout(() => {
        const adIframe = document.querySelector('.ad-wrapper iframe');
        if (!adIframe) {
          window.location.href = destURL;
        }
      }, 1500);

      const tick = setInterval(() => {
        remaining--;
        numEl.textContent = remaining;
        ring.style.strokeDashoffset = CIRCUM * (1 - (remaining / 5));
        if (remaining <= 0) {
          clearInterval(tick);
          localStorage.removeItem('propagandaDestino');
          window.location.href = destURL;
        }
      }, 1000);
    }
  </script>

</body>
</html>
