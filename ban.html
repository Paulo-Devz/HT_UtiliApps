<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔒 IP Bloqueado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
    }
    .ban-box {
      width: 90vw;
      max-width: 400px;
      height: 300px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; color: #d32f2f; }
    .ip { 
      background: rgba(0,0,0,0.05); 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-family: monospace; 
      font-size: 14px; 
      margin: 15px 0;
    }
    .motivo { 
      background: #ffebee; 
      padding: 12px; 
      border-radius: 8px; 
      margin: 15px 0; 
      font-weight: 500;
      color: #c62828;
    }
    .email { 
      margin-top: 25px; 
      font-size: 16px; 
      opacity: 0.8;
    }
    @media (max-width: 480px) { .ban-box { margin: 20px; padding: 30px 20px; } }
  </style>
</head>
<body>
  <div class="ban-box">
    <div class="icon">🔒</div>
    <h1>Acesso Bloqueado</h1>
    <div>Seu IP foi bloqueado temporariamente.</div>
    <div class="ip" id="blockedIp">Carregando IP...</div>
    <div class="motivo" id="banReason">Carregando motivo...</div>
    <div class="email">
      Contato: <strong>pv23778@gmail.com</strong>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const { ip } = await ipRes.json();
        document.getElementById('blockedIp').textContent = ip;

        const checkRes = await fetch(`/api/admin/admin?section=ips&action=check&ip=${ip}`);
        const data = await checkRes.json();
        
        if (data.bloqueado) {
          document.getElementById('banReason').textContent = data.motivo || 'Violação de políticas';
        } else {
          window.location.href = '/';
        }
      } catch (e) {
        document.getElementById('banReason').textContent = 'Erro de verificação';
      }
    })();
  </script>
</body>
</html>
