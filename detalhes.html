<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utili APPS - Detalhes</title>
    <link rel="stylesheet" href="src/style/detalhes.css">
    <link rel="icon" href="src/imgs/UTILI.png">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="grid-lines"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>
    <div class="bg-sweep"></div>

    <header>
        <div class="logo">UTILI APPS</div>
        <nav>
            <a href="contato.html">CONTATO</a>
            <a href="aplicacoes.html" class="btn-aplicacoes">APLICAÇÕES</a>
        </nav>
    </header>

    <main>
        <div class="details-header">
            <h1 class="page-title">DETALHES</h1>
            <button class="btn-abrir-programa" id="btnAbrirPrograma">ABRIR PROGRAMA</button>
        </div>

        <div class="details-grid">

            <div class="panel">
                <div class="panel-label">Desenvolvedor</div>
                <div class="owner-row">
                    <img src="" alt="Dono" class="owner-photo" id="ownerPhoto">
                    <div>
                        <div class="owner-sub">Dono</div>
                        <div class="owner-name" id="ownerName">—</div>
                    </div>
                </div>
                <div class="prog-name" id="programName">—</div>
            </div>

            <div class="panel">
                <div class="panel-label">Informações</div>
                <div class="info-row">
                    <div class="info-item">
                        <div class="info-item-label">Tipo</div>
                        <div class="info-item-value" id="additionalInfo">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-item-label">Data de criação</div>
                        <div class="info-item-value" id="creationDate">—</div>
                    </div>
                </div>
            </div>

            <div class="panel panel-full">
                <div class="panel-label">Descrição</div>
                <div class="description-text" id="description">—</div>
            </div>

            <div class="video-panel" id="videoSection" style="display:none">
                <div class="video-panel-title">Vídeo ilustrativo</div>
                <div id="videoError" class="video-error" style="display:none">
                    ⚠️ Este vídeo não pode ser incorporado. O criador desabilitou a reprodução em sites externos.
                </div>
                <div class="video-container" id="videoContainer">
                    <iframe id="videoFrame" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="video-controls">
                    <button class="video-btn" id="btnPlayPause">▶</button>
                    <a href="" target="_blank" class="btn-open-youtube" id="btnOpenYoutube" style="display:none">🎬 ABRIR NO YOUTUBE</a>
                </div>
            </div>

        </div>
    </main>

    <script src="src/scripts/ads-logic.js"></script>
    <script src="src/scripts/detalhes.js"></script>
</body>
</html>
