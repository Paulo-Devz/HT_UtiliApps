<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu Te Amo 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            position: relative;
        }

        /* Corações caindo e girando */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: clamp(12px, 3vw, 24px);
            color: #ff69b4;
            opacity: 0.7;
            animation: fall linear infinite;
            transform-origin: center;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        svg {
            width: 80vmin;
            height: 20vmin;
            margin-bottom: 3vh;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            z-index: 2;
            position: relative;
        }

        .love-container {
            text-align: center;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2;
            position: relative;
        }

        .love-container.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .main-text {
            font-size: clamp(3.5rem, 12vmin, 9rem);
            color: #000000;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.1),
                0 0 20px rgba(255,20,147,0.3);
            font-weight: 700;
            margin-bottom: 1rem;
            position: relative;
        }

        .main-text::after {
            content: '💖';
            position: absolute;
            font-size: 3rem;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: heartBeat 2s infinite 4s;
        }

        .sub-text {
            font-size: clamp(1.8rem, 5vmin, 3rem);
            color: #333333;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            font-weight: 400;
            margin-top: 1rem;
            line-height: 1.3;
        }

        @keyframes heartBeat {
            0%, 100% { 
                transform: translateX(-50%) scale(1) rotate(-5deg);
                opacity: 0.8;
            }
            50% { 
                transform: translateX(-50%) scale(1.3) rotate(5deg);
                opacity: 1;
            }
        }

        @keyframes dash {
            0% { stroke-dashoffset: 1; }
            80% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 0; }
        }

        @media (max-width: 768px) {
            svg { width: 90vmin; margin-bottom: 2vh; }
            .main-text { margin-bottom: 0.5rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Corações caindo -->
    <div class="hearts" id="hearts"></div>

    <svg xmlns="http://www.w3.org/2000/svg" id="svg5" version="1.1" viewBox="-5 -5 278 56">
        <filter id="blur">
            <feGaussianBlur stdDeviation="1.6" />
        </filter>
        <g id="layer1" transform="translate(29.1 -127.42)">
            <path id="line" d="M-28.73 167.2c26.43 9.21 68.46-9.46 85.45-12.03 18.45-2.78 32.82 4.86 28.75 9.83-3.82 4.66-25.77-21.18-14.81-31.5 9.54-8.98 17.64 10.64 16.42 17.06-1.51-6.2 2.95-26.6 14.74-22.11 11.7 4.46-4.33 49.03-15.44 44.08-6.97-3.1 15.44-16.26 26.1-16 23.03.56 55.6 27.51 126.63 3.36" pathLength="1" />
        </g>
        <g id="layer2" transform="translate(29.1 -127.42)">
            <path filter="url(#blur)" id="point" d="M-28.73 167.2c26.43 9.21 68.46-9.46 85.45-12.03 18.45-2.78 32.82 4.86 28.75 9.83-3.82 4.66-25.77-21.18-14.81-31.5 9.54-8.98 17.64 10.64 16.42 17.06-1.51-6.2 2.95-26.6 14.74-22.11 11.7 4.46-4.33 49.03-15.44 44.08-6.97-3.1 15.44-16.26 26.1-16 23.03.56 55.6 27.51 126.63 3.36" pathLength="1" />
        </g>
    </svg>

    <div class="love-container" id="loveContainer">
        <h1 class="main-text">Eu te amo meu amor</h1>
        <p class="sub-text">
            Ninguém pode substituir você<br>
            <strong>Meu amor, tu és incrível 💕</strong>
        </p>
    </div>

    <script>
        // Gerar corações caindo
        function createFallingHearts() {
            const heartsContainer = document.getElementById('hearts');
            const hearts = ['💖', '💕', '💗', '💝', '💘', '❤️', '🩷'];

            function createHeart() {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 6 + 8) + 's';
                heart.style.animationDelay = Math.random() * 2 + 's';
                
                heartsContainer.appendChild(heart);

                // Remove após animação
                setTimeout(() => {
                    heart.remove();
                }, 14000);
            }

            // Cria corações continuamente
            setInterval(createHeart, 300);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Inicia corações caindo
            createFallingHearts();

            const line = document.getElementById('line');
            const point = document.getElementById('point');
            const loveContainer = document.getElementById('loveContainer');

            // Linha desenha em 3s
            line.style.cssText = `
                fill: none;
                stroke: #e00000;
                stroke-width: 2.5;
                stroke-linecap: butt;
                stroke-linejoin: round;
                stroke-miterlimit: 4;
                stroke-opacity: 1;
                stroke-dasharray: 1;
                stroke-dashoffset: 1;
                animation: dash 3s linear forwards;
            `;

            point.style.cssText = `
                fill: none;
                stroke: #ff1493;
                stroke-width: 6;
                stroke-linecap: round;
                stroke-linejoin: round;
                stroke-miterlimit: 0.1;
                stroke-opacity: 1;
                stroke-dasharray: 0.0001, 0.9999;
                stroke-dashoffset: 1;
                animation: dash 3s linear forwards;
            `;

            // Textos aparecem no final
            setTimeout(() => {
                loveContainer.classList.add('show');
            }, 2800);
        });
    </script>
</body>
</html>
